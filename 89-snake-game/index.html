<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game | Classic Arcade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <div class="logo">
                <i class="fas fa-gamepad"></i>
                <span>Snake<span class="accent">Arcade</span></span>
            </div>
            <div class="high-score">
                <i class="fas fa-trophy"></i>
                <span id="highScore">0</span>
            </div>
            <button id="themeToggle" class="icon-btn">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Main Game Area -->
        <div class="game-wrapper">
            <!-- Game Canvas -->
            <div class="canvas-container">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                <div id="gameOverlay" class="game-overlay" style="display: none;">
                    <div class="game-over-content">
                        <i class="fas fa-skull"></i>
                        <h2>Game Over!</h2>
                        <p>Your Score: <span id="finalScore">0</span></p>
                        <p>High Score: <span id="finalHighScore">0</span></p>
                        <button id="restartBtn" class="btn btn-primary">
                            <i class="fas fa-redo"></i> Play Again
                        </button>
                    </div>
                </div>
                <div id="pauseOverlay" class="game-overlay" style="display: none;">
                    <div class="game-over-content">
                        <i class="fas fa-pause"></i>
                        <h2>Game Paused</h2>
                        <p>Press Space or Click Resume to continue</p>
                        <button id="resumeBtn" class="btn btn-primary">
                            <i class="fas fa-play"></i> Resume
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="game-sidebar">
                <!-- Score Card -->
                <div class="score-card">
                    <h3><i class="fas fa-star"></i> Current Score</h3>
                    <div class="current-score" id="currentScore">0</div>
                </div>

                <!-- Next Food Preview -->
                <div class="next-food-card">
                    <h3><i class="fas fa-apple-alt"></i> Next Food</h3>
                    <div class="food-preview" id="foodPreview"></div>
                </div>

                <!-- Controls Info -->
                <div class="controls-card">
                    <h3><i class="fas fa-keyboard"></i> Controls</h3>
                    <div class="controls-list">
                        <div class="control-item">
                            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
                            <span>Move</span>
                        </div>
                        <div class="control-item">
                            <kbd>Space</kbd>
                            <span>Pause/Resume</span>
                        </div>
                        <div class="control-item">
                            <kbd>R</kbd>
                            <span>Restart</span>
                        </div>
                    </div>
                </div>

                <!-- Game Stats -->
                <div class="stats-card">
                    <h3><i class="fas fa-chart-line"></i> Game Stats</h3>
                    <div class="stats-list">
                        <div class="stat-item">
                            <span>Games Played</span>
                            <span id="gamesPlayed">0</span>
                        </div>
                        <div class="stat-item">
                            <span>Total Score</span>
                            <span id="totalScore">0</span>
                        </div>
                        <div class="stat-item">
                            <span>Best Streak</span>
                            <span id="bestStreak">0</span>
                        </div>
                        <div class="stat-item">
                            <span>Food Eaten</span>
                            <span id="totalFood">0</span>
                        </div>
                    </div>
                </div>

                <!-- Difficulty Selector -->
                <div class="difficulty-card">
                    <h3><i class="fas fa-sliders-h"></i> Difficulty</h3>
                    <div class="difficulty-buttons">
                        <button class="difficulty-btn" data-speed="150">Easy</button>
                        <button class="difficulty-btn active" data-speed="100">Medium</button>
                        <button class="difficulty-btn" data-speed="70">Hard</button>
                        <button class="difficulty-btn" data-speed="50">Expert</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/GameEngine.js"></script>
    <script src="js/modules/SnakeModule.js"></script>
    <script src="js/modules/FoodModule.js"></script>
    <script src="js/modules/ScoreModule.js"></script>
    <script src="js/modules/RenderModule.js"></script>
    <script src="js/modules/InputModule.js"></script>
    <script src="js/components/GameBoard.js"></script>
    <script src="js/components/ScoreBoard.js"></script>
    <script src="js/components/GameOverlay.js"></script>
    <script src="js/components/SettingsPanel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
