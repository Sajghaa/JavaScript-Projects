<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Blog Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>✍ Markdown Blog Engine</h1>
            <div class="header-actions">
                <button id="newPostBtn" class="btn btn-primary">+ New Post</button>
                <button id="viewPostsBtn" class="btn btn-secondary">View Posts</button>
            </div>
        </header>

        <main>
            <!-- Posts List View -->
            <div id="postsView" class="view active">
                <div class="posts-header">
                    <h2>All Posts</h2>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search posts...">
                    </div>
                </div>
                <div id="postsList" class="posts-grid">
                    <!-- Posts will be dynamically inserted here -->
                </div>
            </div>

            <!-- Editor View -->
            <div id="editorView" class="view">
                <div class="editor-container">
                    <div class="editor-header">
                        <input type="text" id="postTitle" placeholder="Post Title" class="title-input">
                        <div class="editor-actions">
                            <button id="savePostBtn" class="btn btn-success">Save Post</button>
                            <button id="cancelEditBtn" class="btn btn-danger">Cancel</button>
                        </div>
                    </div>
                    <div class="split-view">
                        <div class="editor-pane">
                            <h3>Markdown Editor</h3>
                            <textarea id="markdownEditor" placeholder="Write your post in Markdown..."></textarea>
                        </div>
                        <div class="preview-pane">
                            <h3>Live Preview</h3>
                            <div id="preview" class="markdown-preview"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Post View -->
            <div id="postView" class="view">
                <div class="post-container">
                    <button id="backToPostsBtn" class="btn btn-secondary back-btn">← Back to Posts</button>
                    <div id="singlePost" class="single-post">
                        <!-- Single post will be displayed here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/renderer.js"></script>
</body>
</html>
