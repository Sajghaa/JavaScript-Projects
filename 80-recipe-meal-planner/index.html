<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Planner | Meal Planning & Recipe Discovery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-utensils"></i>
                    <span>Recipe<span class="accent">Planner</span></span>
                </div>
                
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search for recipes...">
                        <button id="searchBtn" class="btn btn-primary">Search</button>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="favoritesBtn" class="icon-btn">
                        <i class="fas fa-heart"></i>
                        <span id="favoritesCount" class="badge">0</span>
                    </button>
                    <button id="mealPlannerBtn" class="icon-btn">
                        <i class="fas fa-calendar-week"></i>
                    </button>
                    <button id="shoppingListBtn" class="icon-btn">
                        <i class="fas fa-shopping-basket"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Categories -->
            <div class="categories-section">
                <div class="categories-scroll">
                    <button class="category-chip active" data-category="all">
                        <i class="fas fa-fire"></i> All
                    </button>
                    <button class="category-chip" data-category="Breakfast">
                        <i class="fas fa-sun"></i> Breakfast
                    </button>
                    <button class="category-chip" data-category="Lunch">
                        <i class="fas fa-sun"></i> Lunch
                    </button>
                    <button class="category-chip" data-category="Dinner">
                        <i class="fas fa-moon"></i> Dinner
                    </button>
                    <button class="category-chip" data-category="Dessert">
                        <i class="fas fa-cake-candles"></i> Dessert
                    </button>
                    <button class="category-chip" data-category="Vegetarian">
                        <i class="fas fa-leaf"></i> Vegetarian
                    </button>
                    <button class="category-chip" data-category="Vegan">
                        <i class="fas fa-seedling"></i> Vegan
                    </button>
                    <button class="category-chip" data-category="Quick">
                        <i class="fas fa-clock"></i> Quick & Easy
                    </button>
                </div>
            </div>

            <!-- Diet Filters -->
            <div class="diet-filters">
                <button class="diet-chip" data-diet="glutenFree">
                    <i class="fas fa-wheat-awn-slash"></i> Gluten Free
                </button>
                <button class="diet-chip" data-diet="dairyFree">
                    <i class="fas fa-cheese"></i> Dairy Free
                </button>
                <button class="diet-chip" data-diet="ketogenic">
                    <i class="fas fa-egg"></i> Keto
                </button>
                <button class="diet-chip" data-diet="lowCarb">
                    <i class="fas fa-chart-line"></i> Low Carb
                </button>
                <button class="diet-chip" data-diet="healthy">
                    <i class="fas fa-heartbeat"></i> Healthy
                </button>
            </div>

            <!-- Results Info -->
            <div class="results-info">
                <h2 id="pageTitle">Discover Recipes</h2>
                <div class="sort-controls">
                    <select id="sortSelect" class="sort-select">
                        <option value="popularity">Most Popular</option>
                        <option value="rating">Top Rated</option>
                        <option value="time">Quickest</option>
                        <option value="name">Name A-Z</option>
                    </select>
                </div>
            </div>

            <!-- Recipes Grid -->
            <div id="recipesGrid" class="recipes-grid">
                <!-- Recipes will be dynamically loaded here -->
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Loading delicious recipes...</p>
            </div>

            <!-- Load More -->
            <div id="loadMoreBtn" class="load-more" style="display: none;">
                <button class="btn btn-secondary">Load More Recipes</button>
            </div>
        </main>

        <!-- Sidebar Panels -->
        <!-- Favorites Panel -->
        <div id="favoritesPanel" class="sidebar-panel">
            <div class="panel-header">
                <h3><i class="fas fa-heart"></i> My Favorites</h3>
                <button class="close-panel">&times;</button>
            </div>
            <div id="favoritesList" class="favorites-list">
                <!-- Favorites will be loaded here -->
            </div>
        </div>

        <!-- Meal Planner Panel -->
        <div id="mealPlannerPanel" class="sidebar-panel">
            <div class="panel-header">
                <h3><i class="fas fa-calendar-week"></i> Meal Planner</h3>
                <button class="close-panel">&times;</button>
            </div>
            <div class="week-navigation">
                <button id="prevWeekBtn" class="icon-btn"><i class="fas fa-chevron-left"></i></button>
                <span id="weekRange"></span>
                <button id="nextWeekBtn" class="icon-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div id="mealPlanGrid" class="meal-plan-grid">
                <!-- Meal plan will be loaded here -->
            </div>
        </div>

        <!-- Shopping List Panel -->
        <div id="shoppingListPanel" class="sidebar-panel">
            <div class="panel-header">
                <h3><i class="fas fa-shopping-basket"></i> Shopping List</h3>
                <button class="close-panel">&times;</button>
            </div>
            <div class="shopping-actions">
                <button id="clearShoppingListBtn" class="btn btn-secondary btn-sm">Clear All</button>
                <button id="addCustomItemBtn" class="btn btn-primary btn-sm">Add Item</button>
            </div>
            <div id="shoppingList" class="shopping-list">
                <!-- Shopping list items will be loaded here -->
            </div>
        </div>

        <!-- Recipe Modal -->
        <div id="recipeModal" class="modal">
            <div class="modal-content large">
                <div class="modal-header">
                    <h2 id="modalTitle">Recipe Details</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body" id="recipeModalBody">
                    <!-- Recipe details will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Add to Meal Plan Modal -->
        <div id="mealPlanModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add to Meal Plan</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Select Day</label>
                        <select id="mealDay" class="form-select">
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Meal Type</label>
                        <select id="mealType" class="form-select">
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="snack">Snack</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" id="confirmAddToMealPlanBtn">Add to Plan</button>
                </div>
            </div>
        </div>

        <!-- Add Custom Item Modal -->
        <div id="customItemModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Custom Item</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="customItemName" class="form-input" placeholder="e.g., Tomatoes, Pasta, etc.">
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="text" id="customItemQuantity" class="form-input" placeholder="e.g., 2, 500g, 1 cup">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" id="confirmAddItemBtn">Add to List</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/StorageManager.js"></script>
    <script src="js/components/RecipeCard.js"></script>
    <script src="js/components/MealPlanCard.js"></script>
    <script src="js/components/ShoppingListItem.js"></script>
    <script src="js/components/RecipeModal.js"></script>
    <script src="js/components/CategoryFilter.js"></script>
    <script src="js/modules/APIManager.js"></script>
    <script src="js/modules/RecipeManager.js"></script>
    <script src="js/modules/MealPlannerManager.js"></script>
    <script src="js/modules/FavoritesManager.js"></script>
    <script src="js/modules/ShoppingListManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
