<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard | Live Cryptocurrency Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fab fa-bitcoin"></i>
                    <span>Crypto<span class="accent">Dash</span></span>
                </div>
                
                <div class="market-stats">
                    <div class="stat">
                        <span>Market Cap</span>
                        <strong id="globalMarketCap">$0</strong>
                    </div>
                    <div class="stat">
                        <span>24h Volume</span>
                        <strong id="globalVolume">$0</strong>
                    </div>
                    <div class="stat">
                        <span>BTC Dominance</span>
                        <strong id="btcDominance">0%</strong>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="refreshBtn" class="icon-btn">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button id="portfolioBtn" class="icon-btn">
                        <i class="fas fa-wallet"></i>
                    </button>
                    <button id="themeToggle" class="icon-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Left Column - Crypto List -->
            <div class="crypto-section">
                <div class="section-header">
                    <h2><i class="fas fa-coins"></i> Top Cryptocurrencies</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search coin...">
                    </div>
                </div>
                <div class="crypto-list" id="cryptoList">
                    <!-- Crypto cards will be loaded here -->
                </div>
            </div>

            <!-- Right Column - Chart & Details -->
            <div class="details-section">
                <!-- Price Chart -->
                <div class="chart-container">
                    <div class="chart-header">
                        <div class="chart-title">
                            <h3 id="selectedCoinName">Bitcoin (BTC)</h3>
                            <span id="selectedCoinPrice">$0.00</span>
                            <span id="selectedCoinChange" class="change"></span>
                        </div>
                        <div class="chart-controls">
                            <button class="time-btn active" data-period="1">24h</button>
                            <button class="time-btn" data-period="7">7d</button>
                            <button class="time-btn" data-period="30">30d</button>
                            <button class="time-btn" data-period="90">90d</button>
                            <button class="time-btn" data-period="365">1y</button>
                        </div>
                    </div>
                    <canvas id="priceChart" class="price-chart"></canvas>
                </div>

                <!-- Market Stats -->
                <div class="market-stats-grid" id="marketStats">
                    <!-- Market stats will be loaded here -->
                </div>

                <!-- News Section -->
                <div class="news-section">
                    <h3><i class="fas fa-newspaper"></i> Crypto News</h3>
                    <div id="newsList" class="news-list">
                        <!-- News items will be loaded here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Portfolio Modal -->
        <div id="portfolioModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-wallet"></i> My Portfolio</h2>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="portfolio-summary">
                        <div class="total-value">
                            <span>Total Value</span>
                            <strong id="portfolioTotal">$0.00</strong>
                        </div>
                        <div class="total-change">
                            <span>24h Change</span>
                            <strong id="portfolioChange">$0.00</strong>
                        </div>
                    </div>
                    <div id="portfolioList" class="portfolio-list">
                        <!-- Portfolio items will be loaded here -->
                    </div>
                    <div class="add-asset">
                        <h4>Add Asset</h4>
                        <div class="add-asset-form">
                            <select id="assetSelect" class="form-select">
                                <option value="">Select Coin</option>
                            </select>
                            <input type="number" id="assetAmount" placeholder="Amount" step="any">
                            <input type="number" id="assetPrice" placeholder="Buy Price" step="any">
                            <button id="addAssetBtn" class="btn btn-primary">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/StorageManager.js"></script>
    <script src="js/components/CryptoCard.js"></script>
    <script src="js/components/PriceChart.js"></script>
    <script src="js/components/PortfolioWidget.js"></script>
    <script src="js/components/MarketStats.js"></script>
    <script src="js/components/NewsTicker.js"></script>
    <script src="js/modules/CryptoManager.js"></script>
    <script src="js/modules/ChartManager.js"></script>
    <script src="js/modules/PortfolioManager.js"></script>
    <script src="js/modules/MarketManager.js"></script>
    <script src="js/modules/WebSocketManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
