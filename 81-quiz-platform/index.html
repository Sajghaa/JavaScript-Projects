<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Platform | Test Your Knowledge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>Quiz<span class="accent">Master</span></span>
                </div>
                <div class="header-stats">
                    <div class="stat-badge">
                        <i class="fas fa-trophy"></i>
                        <span id="highScore">0</span>
                    </div>
                </div>
                <button id="themeToggle" class="icon-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Home Screen -->
            <div id="homeScreen" class="screen active">
                <div class="hero-section">
                    <h1>Test Your Knowledge</h1>
                    <p>Choose a category and challenge yourself</p>
                </div>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>

            <!-- Quiz Setup Screen -->
            <div id="quizSetupScreen" class="screen">
                <div class="setup-container">
                    <button class="back-btn" onclick="app.navigateTo('home')">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <div class="quiz-info" id="quizInfo"></div>
                    <div class="setup-options">
                        <div class="option-group">
                            <label>Number of Questions</label>
                            <select id="questionCount" class="form-select">
                                <option value="3">3 Questions</option>
                                <option value="5" selected>5 Questions</option>
                                <option value="10">10 Questions</option>
                            </select>
                        </div>
                        <div class="option-group">
                            <label>Time per Question (seconds)</label>
                            <select id="timeLimit" class="form-select">
                                <option value="0">No Limit</option>
                                <option value="15">15 seconds</option>
                                <option value="30" selected>30 seconds</option>
                                <option value="45">45 seconds</option>
                            </select>
                        </div>
                    </div>
                    <button id="startQuizBtn" class="btn btn-primary btn-large">Start Quiz</button>
                </div>
            </div>

            <!-- Quiz Screen -->
            <div id="quizScreen" class="screen">
                <div class="quiz-header">
                    <div class="quiz-progress">
                        Question <span id="currentQ">1</span> / <span id="totalQ">5</span>
                    </div>
                    <div class="quiz-timer" id="timerDisplay">
                        <i class="fas fa-hourglass-half"></i>
                        <span id="timeLeft">00:00</span>
                    </div>
                    <div class="quiz-score">
                        <i class="fas fa-star"></i>
                        <span id="currentScore">0</span>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="quizProgress"></div>
                </div>
                <div id="questionContainer" class="question-container"></div>
                <div class="quiz-controls">
                    <button id="prevBtn" class="btn btn-secondary" disabled>Previous</button>
                    <button id="nextBtn" class="btn btn-primary">Next</button>
                    <button id="submitBtn" class="btn btn-success" style="display:none">Submit Quiz</button>
                </div>
            </div>

            <!-- Results Screen -->
            <div id="resultsScreen" class="screen">
                <div class="results-container">
                    <div class="results-header">
                        <i class="fas fa-chart-line"></i>
                        <h2>Quiz Complete!</h2>
                    </div>
                    <div class="score-card">
                        <div class="score-circle" id="scoreCircle">
                            <span id="finalScore">0</span><span>%</span>
                        </div>
                        <div class="score-details">
                            <div class="detail-item">Correct Answers: <strong id="correctCount">0</strong></div>
                            <div class="detail-item">Incorrect Answers: <strong id="incorrectCount">0</strong></div>
                            <div class="detail-item">Points Earned: <strong id="pointsEarned">0</strong></div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="retakeBtn" class="btn btn-primary">Retake Quiz</button>
                        <button id="newQuizBtn" class="btn btn-secondary">New Quiz</button>
                    </div>
                    <div id="reviewSection" class="review-section" style="display:none">
                        <h3>Answer Review</h3>
                        <div id="answersReview"></div>
                    </div>
                    <button id="reviewBtn" class="btn btn-outline" style="margin-top:1rem">Review Answers</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>Home</span></button>
            <button class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></button>
        </nav>

        <!-- Profile Screen -->
        <div id="profileScreen" class="screen">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
                    <h2 id="playerName">Quiz Master</h2>
                    <button id="editNameBtn" class="btn btn-secondary btn-sm">Edit Name</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-check-circle"></i><div><div id="totalCorrect">0</div><div>Correct</div></div></div>
                    <div class="stat-card"><i class="fas fa-trophy"></i><div><div id="totalPoints">0</div><div>Points</div></div></div>
                    <div class="stat-card"><i class="fas fa-chart-line"></i><div><div id="totalQuizzes">0</div><div>Quizzes</div></div></div>
                </div>
                <div class="achievements-section">
                    <h3>Achievements</h3>
                    <div id="achievementsList" class="achievements-grid"></div>
                </div>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
