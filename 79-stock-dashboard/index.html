<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard | Real-time Market Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>Stock<span class="accent">Dash</span></span>
                </div>
                
                <div class="market-status">
                    <i class="fas fa-circle"></i>
                    <span>Market Open</span>
                    <span class="update-time" id="updateTime">Last update: Just now</span>
                </div>
                
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-outline">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button id="settingsBtn" class="icon-btn">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Top Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Market Cap</span>
                        <span class="stat-value" id="marketCap">$0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Volume (24h)</span>
                        <span class="stat-value" id="totalVolume">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Portfolio Value</span>
                        <span class="stat-value" id="portfolioValue">$0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-simple"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">24h Change</span>
                        <span class="stat-value" id="totalChange">0%</span>
                    </div>
                </div>
            </div>

            <!-- Main Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3>Market Overview</h3>
                    <div class="chart-controls">
                        <button class="time-btn active" data-period="1D">1D</button>
                        <button class="time-btn" data-period="1W">1W</button>
                        <button class="time-btn" data-period="1M">1M</button>
                        <button class="time-btn" data-period="3M">3M</button>
                        <button class="time-btn" data-period="1Y">1Y</button>
                    </div>
                </div>
                <canvas id="marketChart" class="market-chart"></canvas>
            </div>

            <!-- Stocks Grid -->
            <div class="stocks-header">
                <h3><i class="fas fa-chart-line"></i> Top Stocks</h3>
                <div class="view-controls">
                    <button class="view-btn active" data-view="grid">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn" data-view="list">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
            
            <div id="stocksGrid" class="stocks-grid">
                <!-- Stocks will be dynamically loaded here -->
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="portfolio-widget" id="portfolioWidget">
                <h3><i class="fas fa-wallet"></i> My Portfolio</h3>
                <div id="portfolioList" class="portfolio-list">
                    <!-- Portfolio items will be loaded here -->
                </div>
                <div class="portfolio-total">
                    <span>Total Value</span>
                    <span id="portfolioTotal">$0.00</span>
                </div>
                <button id="addToPortfolioBtn" class="btn btn-primary btn-block">
                    <i class="fas fa-plus"></i> Add Stock
                </button>
            </div>

            <div class="news-widget">
                <h3><i class="fas fa-newspaper"></i> Market News</h3>
                <div id="newsList" class="news-list">
                    <!-- News items will be loaded here -->
                </div>
            </div>

            <div class="alerts-widget">
                <h3><i class="fas fa-bell"></i> Price Alerts</h3>
                <div id="alertsList" class="alerts-list">
                    <!-- Alerts will be loaded here -->
                </div>
                <button id="setAlertBtn" class="btn btn-secondary btn-block">
                    <i class="fas fa-plus"></i> Set Alert
                </button>
            </div>
        </aside>
    </div>

    <!-- Add to Portfolio Modal -->
    <div id="portfolioModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add to Portfolio</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Stock</label>
                    <select id="portfolioStock" class="form-select">
                        <option value="">Choose a stock...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Shares</label>
                    <input type="number" id="portfolioShares" class="form-input" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Purchase Price</label>
                    <input type="number" id="portfolioPrice" class="form-input" step="0.01" readonly>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="savePortfolioBtn">Add to Portfolio</button>
            </div>
        </div>
    </div>

    <!-- Set Alert Modal -->
    <div id="alertModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Set Price Alert</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Stock Symbol</label>
                    <select id="alertStock" class="form-select">
                        <option value="">Choose a stock...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target Price</label>
                    <input type="number" id="alertPrice" class="form-input" step="0.01" placeholder="Enter target price">
                </div>
                <div class="form-group">
                    <label>Condition</label>
                    <select id="alertCondition" class="form-select">
                        <option value="above">Above</option>
                        <option value="below">Below</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="saveAlertBtn">Set Alert</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/StorageManager.js"></script>
    <script src="js/components/StockCard.js"></script>
    <script src="js/components/StockChart.js"></script>
    <script src="js/components/PortfolioWidget.js"></script>
    <script src="js/components/NewsTicker.js"></script>
    <script src="js/components/AlertModal.js"></script>
    <script src="js/modules/StockManager.js"></script>
    <script src="js/modules/ChartManager.js"></script>
    <script src="js/modules/PortfolioManager.js"></script>
    <script src="js/modules/WebSocketSimulator.js"></script>
    <script src="js/modules/AlertManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
