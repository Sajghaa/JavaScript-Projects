<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-store"></i>
                    <span>Mini<span class="accent">Store</span></span>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products...">
                        <button id="searchBtn" class="btn btn-primary">Search</button>
                    </div>
                </div>

                <!-- Header Actions -->
                <div class="header-actions">
                    <button id="cartBtn" class="icon-btn cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount" class="cart-count">0</span>
                    </button>
                    <button id="themeToggle" class="icon-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>

            <!-- Categories Navigation -->
            <nav class="categories-nav" id="categoriesNav">
                <!-- Categories will be dynamically added here -->
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Filter Sidebar -->
                <aside class="filter-sidebar" id="filterSidebar">
                    <!-- Filter panel will be dynamically added here -->
                </aside>

                <!-- Products Grid -->
                <section class="products-section">
                    <div class="section-header">
                        <h2 id="sectionTitle">All Products</h2>
                        <div class="view-options">
                            <button class="view-btn active" data-view="grid">
                                <i class="fas fa-th"></i>
                            </button>
                            <button class="view-btn" data-view="list">
                                <i class="fas fa-list"></i>
                            </button>
                            <select id="sortSelect" class="sort-select">
                                <option value="featured">Featured</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="name-asc">Name: A to Z</option>
                                <option value="name-desc">Name: Z to A</option>
                                <option value="rating">Top Rated</option>
                            </select>
                        </div>
                    </div>

                    <div id="productsGrid" class="products-grid">
                        <!-- Products will be dynamically loaded here -->
                    </div>

                    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                        <div class="spinner"></div>
                    </div>

                    <div id="loadMoreBtn" class="load-more" style="display: none;">
                        <button class="btn btn-secondary">Load More Products</button>
                    </div>
                </section>
            </div>
        </main>

        <!-- Cart Sidebar -->
        <div id="cartSidebar" class="cart-sidebar">
            <div class="cart-header">
                <h3>Your Cart</h3>
                <button class="close-cart" onclick="app.cartManager.closeCart()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Cart items will be dynamically added here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <button id="checkoutBtn" class="btn btn-primary btn-block" onclick="app.checkoutManager.showCheckout()">
                    Proceed to Checkout
                </button>
            </div>
        </div>

        <!-- Product Details Modal -->
        <div id="productModal" class="modal">
            <div class="modal-content large">
                <div class="modal-header">
                    <h2 id="modalProductTitle">Product Details</h2>
                    <button class="close-modal" onclick="app.productManager.closeModal()">&times;</button>
                </div>
                <div class="modal-body" id="productModalBody">
                    <!-- Product details will be dynamically loaded here -->
                </div>
            </div>
        </div>

        <!-- Checkout Modal -->
        <div id="checkoutModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Checkout</h2>
                    <button class="close-modal" onclick="app.checkoutManager.closeCheckout()">&times;</button>
                </div>
                <div class="modal-body" id="checkoutModalBody">
                    <!-- Checkout form will be dynamically loaded here -->
                </div>
            </div>
        </div>

        <!-- Order Confirmation Modal -->
        <div id="orderModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Order Confirmed!</h2>
                    <button class="close-modal" onclick="app.checkoutManager.closeOrderModal()">&times;</button>
                </div>
                <div class="modal-body" id="orderModalBody">
                    <!-- Order confirmation will be dynamically loaded here -->
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
