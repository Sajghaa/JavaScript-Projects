<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map | Location Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Map<span class="accent">Master</span></span>
                </div>
                
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search for a location...">
                        <button id="searchBtn" class="btn btn-primary">Search</button>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="addLocationBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Location
                    </button>
                    <button id="myLocationBtn" class="icon-btn">
                        <i class="fas fa-location-dot"></i>
                    </button>
                    <button id="themeToggle" class="icon-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Map Container -->
            <div class="map-container">
                <div id="map" class="map"></div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="locations">
                        <i class="fas fa-map-pin"></i> Locations
                    </button>
                    <button class="tab-btn" data-tab="routes">
                        <i class="fas fa-route"></i> Routes
                    </button>
                    <button class="tab-btn" data-tab="stats">
                        <i class="fas fa-chart-bar"></i> Stats
                    </button>
                </div>

                <!-- Locations Tab -->
                <div id="locationsTab" class="tab-content active">
                    <div class="locations-header">
                        <h3>Saved Locations</h3>
                        <span id="locationsCount" class="badge">0</span>
                    </div>
                    <div id="locationsList" class="locations-list">
                        <!-- Locations will be dynamically added -->
                    </div>
                </div>

                <!-- Routes Tab -->
                <div id="routesTab" class="tab-content">
                    <div class="route-planner">
                        <h3>Route Planner</h3>
                        <div class="form-group">
                            <label>Start Point</label>
                            <select id="startPoint" class="form-select">
                                <option value="">Select start location</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>End Point</label>
                            <select id="endPoint" class="form-select">
                                <option value="">Select end location</option>
                            </select>
                        </div>
                        <button id="calculateRouteBtn" class="btn btn-primary btn-block">
                            <i class="fas fa-route"></i> Calculate Route
                        </button>
                        <button id="clearRouteBtn" class="btn btn-secondary btn-block" style="display:none;">
                            <i class="fas fa-trash"></i> Clear Route
                        </button>
                        <div id="routeInfo" class="route-info"></div>
                    </div>
                </div>

                <!-- Stats Tab -->
                <div id="statsTab" class="tab-content">
                    <div class="stats-container">
                        <div class="stat-card">
                            <i class="fas fa-map-pin"></i>
                            <div>
                                <div class="stat-value" id="statTotalLocations">0</div>
                                <div class="stat-label">Total Locations</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-layer-group"></i>
                            <div>
                                <div class="stat-value" id="statCategories">0</div>
                                <div class="stat-label">Categories</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clock"></i>
                            <div>
                                <div class="stat-value" id="statRecent">0</div>
                                <div class="stat-label">Recent (7 days)</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-globe"></i>
                            <div>
                                <div class="stat-value" id="statArea">0 km²</div>
                                <div class="stat-label">Coverage Area</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="category-stats">
                        <h4>Locations by Category</h4>
                        <div id="categoryStatsList" class="category-stats-list">
                            <!-- Category stats will be loaded here -->
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Add Location Modal -->
        <div id="locationModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add New Location</h2>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="locationForm">
                        <div class="form-group">
                            <label>Location Name</label>
                            <input type="text" id="locationName" placeholder="e.g., Central Park" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="locationCategory" class="form-select" required>
                                <option value="restaurant">🍽️ Restaurant</option>
                                <option value="cafe">☕ Cafe</option>
                                <option value="park">🌳 Park</option>
                                <option value="museum">🏛️ Museum</option>
                                <option value="hotel">🏨 Hotel</option>
                                <option value="shop">🛍️ Shop</option>
                                <option value="other">📍 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="locationDescription" rows="3" placeholder="Add a description..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="locationAddress" placeholder="Street address">
                        </div>
                        <div class="form-group">
                            <label>Coordinates</label>
                            <div class="coord-row">
                                <input type="number" id="locationLat" step="any" placeholder="Latitude" readonly>
                                <input type="number" id="locationLng" step="any" placeholder="Longitude" readonly>
                            </div>
                            <small class="coord-hint">Click on the map to set coordinates</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" id="saveLocationBtn">Save Location</button>
                </div>
            </div>
        </div>

        <!-- Edit Location Modal -->
        <div id="editLocationModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Edit Location</h2>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="editLocationForm">
                        <input type="hidden" id="editLocationId">
                        <div class="form-group">
                            <label>Location Name</label>
                            <input type="text" id="editLocationName" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="editLocationCategory" class="form-select" required>
                                <option value="restaurant">🍽️ Restaurant</option>
                                <option value="cafe">☕ Cafe</option>
                                <option value="park">🌳 Park</option>
                                <option value="museum">🏛️ Museum</option>
                                <option value="hotel">🏨 Hotel</option>
                                <option value="shop">🛍️ Shop</option>
                                <option value="other">📍 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="editLocationDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="editLocationAddress">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-danger" id="deleteLocationBtn">Delete</button>
                    <button class="btn btn-primary" id="updateLocationBtn">Update</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/core/StateManager.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/StorageManager.js"></script>
    <script src="js/components/MarkerPopup.js"></script>
    <script src="js/components/LocationForm.js"></script>
    <script src="js/components/LocationList.js"></script>
    <script src="js/components/SearchBar.js"></script>
    <script src="js/components/RoutePlanner.js"></script>
    <script src="js/modules/MapManager.js"></script>
    <script src="js/modules/MarkerManager.js"></script>
    <script src="js/modules/LocationManager.js"></script>
    <script src="js/modules/SearchManager.js"></script>
    <script src="js/modules/GeolocationManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
