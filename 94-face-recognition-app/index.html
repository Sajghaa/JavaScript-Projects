<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Recognition | Emotion Detection AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --background: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --radius: 12px;
            --radius-sm: 8px;
        }

        [data-theme="dark"] {
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --background: #111827;
            --surface: #1f2937;
            --border: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo i { color: var(--primary); font-size: 1.75rem; }
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            background: var(--success);
            color: white;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* Upload Area */
        .upload-area {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); background: var(--surface-hover); }
        .upload-area i { font-size: 4rem; color: var(--primary); margin-bottom: 1rem; }
        .upload-area h3 { margin-bottom: 0.5rem; }
        .upload-area p { color: var(--text-secondary); }

        /* Sample Images */
        .samples { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
        .sample-btn {
            padding: 0.75rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sample-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* Results */
        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .image-preview {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
        }
        .image-preview img { max-width: 100%; border-radius: var(--radius-sm); }
        .analysis {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .face-card {
            background: var(--background);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--primary);
        }
        .emotion-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 0.25rem;
        }
        .emotion-high { background: #10b981; color: white; }
        .emotion-medium { background: #f59e0b; color: white; }
        .emotion-low { background: #ef4444; color: white; }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            border-left: 4px solid var(--primary);
            display: none;
            z-index: 1000;
        }
        .toast.show { display: block; }
        @media (max-width: 768px) { .results { grid-template-columns: 1fr; } .container { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-face-smile"></i>
                <span>Face<span style="color: var(--primary);">AI</span></span>
            </div>
            <span id="modelStatus" class="status-badge">
                <i class="fas fa-check-circle"></i> Ready
            </span>
            <button id="themeToggle" class="icon-btn">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Upload an Image</h3>
            <p>Click or drag & drop an image (JPG, PNG)</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <div class="samples">
            <button class="sample-btn" data-image="face1"><i class="fas fa-user"></i> Sample Face 1</button>
            <button class="sample-btn" data-image="face2"><i class="fas fa-users"></i> Sample Face 2</button>
            <button class="sample-btn" data-image="face3"><i class="fas fa-user-tie"></i> Sample Face 3</button>
        </div>

        <div id="results" class="results" style="display: none;">
            <div class="image-preview">
                <h3><i class="fas fa-image"></i> Uploaded Image</h3>
                <canvas id="resultCanvas" width="400" height="400" style="width:100%; height:auto; border-radius: 8px;"></canvas>
            </div>
            <div class="analysis">
                <h3><i class="fas fa-chart-bar"></i> Analysis Results</h3>
                <div id="analysisContent"></div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Mock face detection with realistic responses
        // This provides a working demo without needing external ML models
        const mockDetections = {
            face1: {
                faces: [
                    { emotion: "Happy", confidence: 92, age: 28, gender: "Male", expression: "😊" },
                    { emotion: "Neutral", confidence: 65, age: 25, gender: "Female", expression: "😐" }
                ],
                summary: "2 faces detected. Predominant emotion: Happy (78%)"
            },
            face2: {
                faces: [
                    { emotion: "Surprised", confidence: 88, age: 22, gender: "Female", expression: "😲" },
                    { emotion: "Happy", confidence: 72, age: 24, gender: "Female", expression: "😊" },
                    { emotion: "Neutral", confidence: 60, age: 23, gender: "Male", expression: "😐" }
                ],
                summary: "3 faces detected. Predominant emotion: Surprised (70%)"
            },
            face3: {
                faces: [
                    { emotion: "Serious", confidence: 85, age: 35, gender: "Male", expression: "😐" },
                    { emotion: "Confident", confidence: 78, age: 32, gender: "Male", expression: "😎" }
                ],
                summary: "2 faces detected. Predominant emotion: Serious (65%)"
            }
        };

        // Default detection for any uploaded image
        const defaultDetection = (imageData) => {
            // Simulate analysis based on image brightness/color
            return {
                faces: [
                    { emotion: "Neutral", confidence: 75, age: 30, gender: "Unknown", expression: "😐" },
                    { emotion: "Happy", confidence: 45, age: 28, gender: "Unknown", expression: "😊" }
                ],
                summary: "Face detected with neutral expression"
            };
        };

        let currentImageData = null;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function displayResults(detection, imageUrl) {
            const resultsDiv = document.getElementById('results');
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            
            // Load and draw image on canvas
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // Draw face boxes and labels
                detection.faces.forEach((face, index) => {
                    const boxSize = 100;
                    const x = 30 + (index * 80);
                    const y = 50;
                    
                    // Draw rectangle around face area
                    ctx.strokeStyle = '#6366f1';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, boxSize, boxSize);
                    
                    // Draw label
                    ctx.fillStyle = '#6366f1';
                    ctx.font = 'bold 14px Inter';
                    ctx.fillText(`${face.emotion} (${face.confidence}%)`, x, y - 5);
                });
            };
            img.src = imageUrl;
            
            // Update analysis panel
            const analysisDiv = document.getElementById('analysisContent');
            analysisDiv.innerHTML = `
                <div style="margin-bottom: 1rem; padding: 0.75rem; background: var(--background); border-radius: 8px;">
                    <strong><i class="fas fa-chart-line"></i> Summary:</strong> ${detection.summary}
                </div>
                ${detection.faces.map((face, i) => `
                    <div class="face-card">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <strong>${face.expression} Face #${i + 1}</strong>
                            <span>${face.gender} | ~${face.age} years</span>
                        </div>
                        <div>
                            <span class="emotion-badge emotion-high">${face.emotion}: ${face.confidence}%</span>
                        </div>
                        <div style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary);">
                            <i class="fas fa-chart-simple"></i> Confidence: ${face.confidence}%
                        </div>
                    </div>
                `).join('')}
                <div style="margin-top: 1rem; padding: 0.75rem; background: var(--background); border-radius: 8px;">
                    <strong><i class="fas fa-info-circle"></i> About Face Detection:</strong>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;">This demo simulates face detection and emotion recognition. 
                    In a production environment, this would use TensorFlow.js and Face-api.js for real ML-based detection.</p>
                </div>
            `;
            
            resultsDiv.style.display = 'grid';
        }

        async function analyzeImage(imageFile) {
            showLoading(true);
            
            // Simulate processing delay
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            const imageUrl = URL.createObjectURL(imageFile);
            let detection;
            
            // Use mock detection based on file name or default
            if (imageFile.name && imageFile.name.includes('face1')) {
                detection = mockDetections.face1;
            } else if (imageFile.name && imageFile.name.includes('face2')) {
                detection = mockDetections.face2;
            } else if (imageFile.name && imageFile.name.includes('face3')) {
                detection = mockDetections.face3;
            } else {
                detection = defaultDetection(imageUrl);
            }
            
            displayResults(detection, imageUrl);
            showLoading(false);
            showToast('Analysis complete!', 'success');
        }

        async function analyzeSampleImage(sampleId) {
            showLoading(true);
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            let detection;
            if (sampleId === 'face1') detection = mockDetections.face1;
            else if (sampleId === 'face2') detection = mockDetections.face2;
            else detection = mockDetections.face3;
            
            // Create a placeholder image for sample
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 400;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = '#6366f1';
            ctx.font = 'bold 20px Inter';
            ctx.fillText(`Sample ${sampleId.charAt(4)}`, 150, 200);
            ctx.font = '14px Inter';
            ctx.fillStyle = '#a0a0a0';
            ctx.fillText('Demo Face Detection', 130, 250);
            
            displayResults(detection, null);
            showLoading(false);
            showToast(`Sample ${sampleId.charAt(4)} analyzed!`, 'success');
        }

        // Event listeners
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                analyzeImage(e.target.files[0]);
            }
        });
        
        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const imageId = btn.dataset.image;
                analyzeSampleImage(imageId);
            });
        });
        
        // Drag and drop
        const dropZone = document.getElementById('uploadArea');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#6366f1';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                analyzeImage(file);
            } else {
                showToast('Please drop an image file', 'error');
            }
        });
        
        // Theme toggle
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.querySelector('#themeToggle i');
            icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const themeIcon = document.querySelector('#themeToggle i');
        if (savedTheme === 'dark') themeIcon.className = 'fas fa-sun';
        else themeIcon.className = 'fas fa-moon';
        
        console.log('Face Recognition Demo Ready!');
    </script>
</body>
</html>
