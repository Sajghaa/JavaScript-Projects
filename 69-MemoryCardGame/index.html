<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game | Advanced</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Memory Card Game</h1>
            <div class="game-stats">
                <div class="stat">
                    <span class="stat-label">Moves:</span>
                    <span id="moves" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pairs:</span>
                    <span id="pairs-matched" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Time:</span>
                    <span id="timer" class="stat-value">00:00</span>
                </div>
            </div>
        </header>

        <div class="game-controls">
            <select id="difficulty" class="difficulty-select">
                <option value="easy">Easy (4x3)</option>
                <option value="medium" selected>Medium (4x4)</option>
                <option value="hard">Hard (6x6)</option>
            </select>
            <button id="newGame" class="btn btn-primary">New Game</button>
            <button id="shuffle" class="btn btn-secondary">Shuffle</button>
        </div>

        <div id="gameBoard" class="game-board"></div>

        <div class="game-message" id="gameMessage"></div>
        
        <div class="game-footer">
            <button id="toggleTheme" class="btn-theme">🌙 Dark Mode</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
